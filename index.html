<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Toscane</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080808;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #080808;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(0.75rem, 2vw, 1.5rem);
      }

      main {
        width: min(100%, 1100px);
        display: grid;
        gap: 1rem;
      }

      video {
        width: 100%;
        max-height: calc(100vh - 3rem);
        display: block;
        border-radius: 8px;
        background: #000;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
      }

      .fallback {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
        text-align: center;
      }

      .fallback a {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <video controls playsinline preload="metadata" poster="">
        <source src="faire-part.mp4" type="video/mp4">
        Votre navigateur ne peut pas lire cette video.
      </video>
      <p class="fallback">
        Si la video ne se lance pas, <a href="faire-part.mp4">ouvrez-la directement</a>.
      </p>
    </main>
  </body>
</html>
